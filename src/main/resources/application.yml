spring:
  application:
    name: control-plane
  datasource:
    # 默认连本地 docker-compose.local.yml 起的 PostgreSQL；生产/测试经环境变量覆盖。
    url: ${CONTROL_PLANE_DB_URL:jdbc:postgresql://localhost:5432/control_plane}
    username: ${CONTROL_PLANE_DB_USER:control_plane}
    password: ${CONTROL_PLANE_DB_PASSWORD:control_plane}
  jpa:
    # schema 由 Flyway 管理，JPA 不做 DDL（仅校验映射与库一致）。
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

# 控制平面开通编排配置。
# hashmatrix.control-plane.provisioning.mode=stub（默认）：用日志/空操作适配器模拟开通时序，
# 无需活集群即可端到端跑通；真实 Keycloak/Helm/K8s/Doris/ESO 适配器接入后切换对应 mode（见 README 路线图）。
#
# identity 端口可与全局 mode 解耦地单独切真实适配器：
#   identity 未设 / =stub → stub 身份适配器；=keycloak → 真实 Keycloak Admin 适配器
#   （此时 compute/data/secrets 仍随 mode=stub 走 stub，「真 identity + stub 其余」共存）。
# 默认不设 identity → 保持全 stub，现有路径零改动。
hashmatrix:
  control-plane:
    provisioning:
      mode: stub
      # identity: keycloak            # 取消注释以启用真实 Keycloak 身份开通
      # keycloak:                     # 仅 identity=keycloak 时生效；🔴 红线：以下均为本地脱敏占位、经环境变量覆盖，勿入真实凭据
      #   server-url: ${KEYCLOAK_SERVER_URL:http://localhost:8180}
      #   auth-realm: ${KEYCLOAK_AUTH_REALM:master}
      #   target-realm: ${KEYCLOAK_TARGET_REALM:hashmatrix}
      #   client-id: ${KEYCLOAK_CLIENT_ID:admin-cli}
      #   username: ${KEYCLOAK_ADMIN_USER:admin}
      #   password: ${KEYCLOAK_ADMIN_PASSWORD:admin}
      #   tenant-admin-role: ${KEYCLOAK_TENANT_ADMIN_ROLE:tenant-admin}
      #   domain-suffix: ${KEYCLOAK_DOMAIN_SUFFIX:example.com}

# 端口基线（主仓统一）：应用 HTTP=8081、管理/actuator=9081（management.server.port 独立）；均 ${ENV:默认} 可覆盖。
server:
  port: ${SERVER_PORT:8081}

management:
  server:
    # actuator 独立端口：探针/指标/Prometheus 走此端口，与应用面隔离。
    # 🔒 部署约束：9081 仅 in-cluster 探针 + 抓取可达，禁经网关/Ingress 对外暴露
    #   （由主仓 Helm chart 的 Service/NetworkPolicy 保证；独立端口子上下文不在 app 安全链内）。
    port: ${MANAGEMENT_SERVER_PORT:9081}
  endpoints:
    web:
      exposure:
        # prometheus 指标出口由 starter-observability 提供。
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
