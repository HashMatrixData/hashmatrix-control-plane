# 构建并推送控制平面容器镜像到 GitHub Container Registry（ghcr.io）。
#
# 触发：打 semver tag（v*.*.*）→ 构建并推送；或手动 workflow_dispatch → 默认 dry-run（仅构建不推）。
#   仅在发版 tag / 手动触发上运行，**普通 push / PR 不触发**——避免在上游制品（hashmatrix-bom v0.2.0 等）
#   发布前让 main 的 CI 变红；制品就绪后打 tag 即出镜像。
#
# 🔴 红线：制品仓凭据 / Maven settings 仅运行期注入，**绝不入库 / 不落镜像层**。
#   - GHCR 登录用内置 GITHUB_TOKEN（需 packages: write 权限）。
#   - 解析 hashmatrix-* 私有制品所需的 Maven settings.xml 用内置 GITHUB_TOKEN 现场生成
#     （对齐 governance ci.yml，无需手动配置 MAVEN_SETTINGS_XML secret / PAT）：写入 runner
#     临时目录，再以 BuildKit secret（id=maven_settings）挂入 docker build（见 Dockerfile 的
#     --mount=type=secret）——不写进任何镜像层、不入库。
#   ⚠️ 前提：内置 GITHUB_TOKEN 须能读 HashMatrixData/hashmatrix 的 Packages（org internal 可见
#      或显式授予本仓）；拿不到（401/403）时再回退到手动 PAT settings.xml。
name: publish-image

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      push:
        description: '推送到 ghcr（false=仅本地构建 dry-run）'
        type: boolean
        default: false

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/hashmatrixdata/control-plane

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 解析镜像 tag（semver / 短 SHA）
        id: meta
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"            # v1.2.3 → 1.2.3
          else
            version="0.0.0-dev.${GITHUB_SHA::7}"
          fi
          {
            echo "version=${version}"
            echo "tags=${IMAGE}:${version},${IMAGE}:sha-${GITHUB_SHA::7}"
          } >> "$GITHUB_OUTPUT"

      - name: 判定是否推送（tag → 推；dispatch → 看输入）
        id: gate
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=${{ inputs.push }}" >> "$GITHUB_OUTPUT"
          fi

      # 用内置 GITHUB_TOKEN 现场生成 settings.xml（对齐 governance ci.yml 的做法）——
      # 无需手动配置 MAVEN_SETTINGS_XML secret / PAT。job 级 packages:write 含 read，
      # 足以解析 HashMatrixData/hashmatrix 的 hashmatrix-* 私有制品。
      # 用 <profiles> 注册制品仓（不仅 server 凭据）：pom 的 <repositories> 解析不到 <parent> 自身，
      # parent 必须经 settings.xml 的 repository 解析，全新 clone 方可在镜像内 mvn package。
      - name: 生成 Maven settings（GitHub Packages · 内置 GITHUB_TOKEN）
        env:
          GH_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > "${RUNNER_TEMP}/m2-settings.xml" <<EOF
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${GH_ACTOR}</username>
                <password>${GH_TOKEN}</password>
              </server>
            </servers>
            <profiles>
              <profile>
                <id>github</id>
                <repositories>
                  <repository>
                    <id>github</id>
                    <url>https://maven.pkg.github.com/HashMatrixData/hashmatrix</url>
                    <releases><enabled>true</enabled></releases>
                    <snapshots><enabled>false</enabled></snapshots>
                  </repository>
                </repositories>
                <pluginRepositories>
                  <pluginRepository>
                    <id>github</id>
                    <url>https://maven.pkg.github.com/HashMatrixData/hashmatrix</url>
                  </pluginRepository>
                </pluginRepositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>github</activeProfile>
            </activeProfiles>
          </settings>
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        if: steps.gate.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ steps.gate.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          secret-files: |
            maven_settings=${{ runner.temp }}/m2-settings.xml
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
